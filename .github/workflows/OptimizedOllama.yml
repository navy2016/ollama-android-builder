name: Optimized Build - Ollama Android ARM64 (Fixed)

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: Ollama version to build
        required: true
        default: v0.18.3
      build_mode:
        description: Build mode
        required: true
        default: full
        type: choice
        options:
          - full
          - simple

env:
  OLLAMA_VERSION: v0.18.3
  GO_VERSION: '1.23'
  NDK_VERSION: 'r26c'
  ANDROID_API: '33'
  PARALLEL_JOBS: '2'

jobs:
  build-binary:
    name: Build Ollama Binary
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ollama/ollama
          ref: ${{ github.event.inputs.ollama_version || env.OLLAMA_VERSION }}
          fetch-depth: 1
          submodules: ${{ github.event.inputs.build_mode == 'full' && 'recursive' || 'false' }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ~/android-ndk-${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Download NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          wget -q --show-progress https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip -O ndk.zip
          unzip -q ndk.zip -d ~
          rm ndk.zip

      - name: Setup Environment
        run: |
          NDK=~/android-ndk-${NDK_VERSION}
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "CC=$TC/bin/aarch64-linux-android${ANDROID_API}-clang" >> $GITHUB_ENV
          echo "CXX=$TC/bin/aarch64-linux-android${ANDROID_API}-clang++" >> $GITHUB_ENV
          echo "STRIP=$TC/bin/llvm-strip" >> $GITHUB_ENV
          echo "GOOS=android" >> $GITHUB_ENV
          echo "GOARCH=arm64" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV

      - name: Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build llama.cpp
        if: github.event.inputs.build_mode != 'simple'
        id: build_llama
        continue-on-error: true
        run: |
          mkdir -p llama/build && cd llama/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${ANDROID_API} \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_METAL=OFF \
            -DLLAMA_CUDA=OFF \
            -GNinja
          ninja -j${{ env.PARALLEL_JOBS }}

      - name: Build Simple
        if: github.event.inputs.build_mode == 'simple' || steps.build_llama.outcome == 'failure'
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build \
            -ldflags="-s -w" \
            -o build/ollama-android-arm64 \
            ./cmd/ollama

      - name: Build Full
        if: github.event.inputs.build_mode != 'simple' && steps.build_llama.outcome == 'success'
        run: |
          export CGO_CFLAGS="-I$PWD/llama/include"
          export CGO_LDFLAGS="-L$PWD/llama/build -llama"
          go build -ldflags="-s -w -linkmode external" \
            -o build/ollama-android-arm64 \
            ./cmd/ollama

      - name: Verify
        run: |
          ls -lh build/ollama-android-arm64
          file build/ollama-android-arm64
          $STRIP build/ollama-android-arm64 || true

      - name: Package
        run: |
          mkdir -p artifacts
          cp build/ollama-android-arm64 artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: binary
          path: artifacts/

      - name: Logs
        if: always()
        run: mkdir -p logs && cp *.log logs/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs
          path: logs/
          if-no-files-found: ignore

      - id: result
        if: always()
        run: |
          if [ -f build/ollama-android-arm64 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  build-apk:
    needs: build-binary
    if: needs.build-binary.outputs.status == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binary
          path: bin/
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: |
          mkdir -p android/app/src/main/assets/
          cp bin/ollama-android-arm64 android/app/src/main/assets/
      - run: cd android && ./gradlew assembleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: application
          path: app/build/outputs/apk/release/*.apk
