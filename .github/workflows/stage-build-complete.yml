name: Stage Build - Complete

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: 'Ollama version to build'
        required: true
        default: 'v0.18.3'
      release_tag:
        description: 'Release tag (optional)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  NDK_VERSION: r26c
  ANDROID_API: 33
  ARCH: arm64-v8a

jobs:
  build-ollama-binary:
    name: Stage 1 - Build Ollama Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Ollama Repository
        uses: actions/checkout@v4
        with:
          repository: ollama/ollama
          ref: ${{ github.event.inputs.ollama_version || 'v0.18.3' }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config

      - name: Download and Setup Android NDK
        run: |
          wget -q --show-progress "https://dl.google.com/android/repository/android-ndk-r26c-linux.zip" -O ndk.zip
          unzip -q ndk.zip
          mv android-ndk-r26c $HOME/android-ndk
          rm ndk.zip
          echo "NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Setup Environment Variables
        run: |
          export NDK_HOME=$HOME/android-ndk
          export TC=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export API=33
          export PRE=aarch64-linux-android
          echo "TOOLCHAIN=$TC" >> $GITHUB_ENV
          echo "CC=$TC/bin/${PRE}${API}-clang" >> $GITHUB_ENV
          echo "CXX=$TC/bin/${PRE}${API}-clang++" >> $GITHUB_ENV
          echo "AR=$TC/bin/llvm-ar" >> $GITHUB_ENV
          echo "STRIP=$TC/bin/llvm-strip" >> $GITHUB_ENV
          echo "GOOS=android" >> $GITHUB_ENV
          echo "GOARCH=arm64" >> $GITHUB_ENV
          echo "CGO_ENABLED=1" >> $GITHUB_ENV
          echo "CGO_CFLAGS=-I$TC/sysroot/usr/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L$TC/sysroot/usr/lib/aarch64-linux-android/33" >> $GITHUB_ENV

      - name: Build llama.cpp for Android ARM64
        run: |
          echo "Building llama.cpp"
          mkdir -p llama/build_android && cd llama/build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_ARM_NEON=ON \
            -DLLAMA_METAL=OFF \
            -DLLAMA_CUDA=OFF \
            -GNinja
          ninja -j$(nproc)

      - name: Build Ollama Binary with CGO
        run: |
          mkdir -p build/android_arm64
          go mod download
          go build -v -o build/android_arm64/ollama \
            -ldflags "-s -w -linkmode external -extldflags '-static'" \
            -tags "android" ./cmd/ollama
          ls -la build/android_arm64/
          file build/android_arm64/ollama

      - name: Strip Binary
        run: |
          $STRIP build/android_arm64/ollama || true
          ls -lh build/android_arm64/ollama

      - name: Upload Ollama Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ollama-android-arm64-binary
          path: build/android_arm64/ollama
          retention-days: 7
          if-no-files-found: error

  # ============================================
  # Stage 2: Build Complete APK
  # ============================================
  build-apk:
    name: Stage 2 - Build APK
    runs-on: ubuntu-latest
    needs: build-ollama-binary

    steps:
      - name: Checkout OllamaServer Repository
        uses: actions/checkout@v4
        with:
          repository: sunshine0523/OllamaServer
          submodules: recursive
          fetch-depth: 0

      - name: Download Ollama Binary Artifact
        uses: actions/download-artifact@v4
        with:
          name: ollama-android-arm64-binary
          path: downloaded-binary/

      - name: Setup Binary
        run: |
          mkdir -p app/src/main/assets/
          cp downloaded-binary/ollama app/src/main/assets/ollama-arm64
          chmod +x app/src/main/assets/ollama-arm64
          file app/src/main/assets/ollama-arm64

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install npm Dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          find app/build/outputs -name "*.apk" -type f

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OllamaServer-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "========================================="
          echo "Build Process Completed!"
          echo "========================================="
          ls -la app/build/outputs/apk/release/

      - name: Rename APK with Version
        run: |
          mkdir -p release-apk
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" "release-apk/OllamaServer-v0.18.3-android.apk"
            fi
          done
          ls -la release-apk/

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Signing APK..."
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            for apk in release-apk/*.apk; do
              jarsigner -keystore release.keystore \
                -storepass "$KEYSTORE_PASSWORD" \
                -keypass "$KEY_PASSWORD" "$apk" "$KEY_ALIAS"
            done
            rm release.keystore
          else
            echo "No keystore provided, using unsigned APK"
          fi

      - name: Upload Renamed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OllamaServer-APK-Final
          path: release-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: OllamaServer Android v0.18.3
          files: release-apk/*.apk
          draft: false
          prerelease: false
