name: Build APK - Final

on:
  workflow_dispatch:
    inputs:
      ollama_binary_source:
        description: Ollama binary source (release/url/none)
        required: false
        default: release
      ollama_version:
        description: Ollama version for APK name
        required: false
        default: 0.18.3

jobs:
  build:
    name: Build OllamaServer APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout OllamaServer
        uses: actions/checkout@v4
        with:
          repository: sunshine0523/OllamaServer
          path: OllamaServer
          fetch-depth: 0

      - name: Prepare Ollama Binary
        run: |
          echo === Preparing Ollama Binary ===
          mkdir -p OllamaServer/android/app/src/main/assets/arm64-v8a
          BINARY_PATH=OllamaServer/android/app/src/main/assets/arm64-v8a/ollama
          VERSION_FILE=OllamaServer/android/app/src/main/assets/arm64-v8a/version.txt
          if [ "${{ github.event.inputs.ollama_binary_source }}" = "release" ] || [ -z "${{ github.event.inputs.ollama_binary_source }}" ]; then
            echo Attempting to download from OllamaServer releases...
            curl -L -o ollama-android.tar.gz "https://github.com/sunshine0523/OllamaServer/releases/download/v0.0.5/ollama-android-arm64.tar.gz" || true
            if [ -f ollama-android.tar.gz ] && [ -s ollama-android.tar.gz ]; then
              echo Downloaded tar.gz, extracting...
              mkdir -p extracted
              tar -xzf ollama-android.tar.gz -C extracted/ || true
              if [ -f extracted/arm64-v8a/ollama ]; then
                cp extracted/arm64-v8a/ollama "$BINARY_PATH"
              elif [ -f extracted/ollama ]; then
                cp extracted/ollama "$BINARY_PATH"
              fi
            fi
          fi
          if [ ! -f "$BINARY_PATH" ]; then
            echo Creating placeholder binary...
            echo '#!/system/bin/sh' > "$BINARY_PATH"
            echo 'echo Ollama placeholder - replace with real binary' >> "$BINARY_PATH"
          fi
          echo "${{ github.event.inputs.ollama_version }}" > "$VERSION_FILE"
          chmod +x "$BINARY_PATH"
          ls -lh "$BINARY_PATH"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: OllamaServer/package-lock.json

      - name: Install npm Dependencies
        working-directory: ./OllamaServer
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build Release APK
        working-directory: ./OllamaServer/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
          find ../ -name '*.apk' -type f

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OllamaServer-APK-${{ github.event.inputs.ollama_version }}
          path: OllamaServer/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload APK Artifact Alternative
        uses: actions/upload-artifact@v4
        with:
          name: OllamaServer-APK-All
          path: OllamaServer/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        run: |
          echo Build Process Completed!
          find OllamaServer -name '*.apk' -type f
