name: Build APK Only

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout OllamaServer
      uses: actions/checkout@v4
      with:
        repository: sunshine0523/OllamaServer
        path: OllamaServer

    - name: Keep existing ollama binary
      run: |
        mkdir -p OllamaServer/android/app/src/main/assets/arm64-v8a
        # 保留原始的 ollama 二进制文件
        echo "0.18.3" > OllamaServer/android/app/src/main/assets/arm64-v8a/version.txt

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies and build APK
      working-directory: ./OllamaServer
      run: |
        npm install
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a-release
        path: OllamaServer/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
