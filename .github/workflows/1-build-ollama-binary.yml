name: 1. Build Ollama Android Binary

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: 'Ollama version to build'
        required: true
        default: 'v0.18.3'

env:
  OLLAMA_VERSION: ${{ github.event.inputs.ollama_version || 'v0.18.3' }}

jobs:
  build-ollama:
    runs-on: ubuntu-22.04
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build git curl wget unzip
        
    - name: Setup Android NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
        unzip -q android-ndk-r26c-linux.zip
        echo "ANDROID_NDK=$PWD/android-ndk-r26c" >> $GITHUB_ENV
        
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        
    - name: Checkout Ollama source
      uses: actions/checkout@v4
      with:
        repository: ollama/ollama
        ref: ${{ env.OLLAMA_VERSION }}
        path: ollama
        fetch-depth: 0
        
    - name: Build llama.cpp for Android
      working-directory: ./ollama/llama
      run: |
        export ANDROID_NDK=$GITHUB_WORKSPACE/android-ndk-r26c
        export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=33
        
        export AR=$TOOLCHAIN/bin/llvm-ar
        export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
        export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
        export LD=$TOOLCHAIN/bin/ld
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        
        mkdir -p build-android && cd build-android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-${API} \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLAMA_BUILD_TESTS=OFF \
          -DLLAMA_BUILD_EXAMPLES=OFF \
          -DLLAMA_NATIVE=OFF \
          -DLLAMA_ARM_NEON=ON \
          -DLLAMA_OPENMP=OFF \
          -DCMAKE_C_FLAGS="-fPIC -O3" \
          -DCMAKE_CXX_FLAGS="-fPIC -O3" \
          -GNinja
          
        ninja -j$(nproc)
        
        echo "=== Built libraries ==="
        find . -name "*.a" -o -name "*.so" | head -20
        ls -la libllama.a || true
        ls -la libllama.so || true
        
    - name: Build Ollama binary
      working-directory: ./ollama
      run: |
        export ANDROID_NDK=$GITHUB_WORKSPACE/android-ndk-r26c
        export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=33
        
        export CGO_ENABLED=1
        export GOOS=android
        export GOARCH=arm64
        export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
        export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
        
        export LLAMA_BUILD_DIR=$PWD/llama/build-android
        export CGO_CFLAGS="-I$PWD/llama -I$LLAMA_BUILD_DIR -fPIC -O3 -DANDROID"
        export CGO_CXXFLAGS="$CGO_CFLAGS"
        export CGO_LDFLAGS="-L$LLAMA_BUILD_DIR -lllama -pie -static-libstdc++"
        
        echo "=== Building Ollama binary ==="
        go build -v -x -ldflags="-s -w -linkmode external -extldflags '-pie -static'" \
          -o ollama-android-arm64 \
          ./cmd/ollama 2>&1 | tail -50
          
        if [ -f ollama-android-arm64 ]; then
          echo "=== Build successful ==="
          file ollama-android-arm64
          ls -lh ollama-android-arm64
          STRIP_CMD="$TOOLCHAIN/bin/llvm-strip"
          $STRIP_CMD ollama-android-arm64
          ls -lh ollama-android-arm64
        else
          echo "=== Build failed, trying alternative method ==="
          go build -ldflags="-s -w" -o ollama-android-arm64 ./cmd/ollama
        fi
        
    - name: Package binary
      run: |
        mkdir -p output/arm64-v8a
        if [ -f ollama/ollama-android-arm64 ]; then
          cp ollama/ollama-android-arm64 output/arm64-v8a/ollama
          echo "${{ env.OLLAMA_VERSION }}" > output/arm64-v8a/version.txt
          chmod +x output/arm64-v8a/ollama
          echo "=== Final binary ==="
          file output/arm64-v8a/ollama
          ls -lh output/arm64-v8a/ollama
          
          cd output
          tar -czf ollama-android-arm64-${{ env.OLLAMA_VERSION }}.tar.gz arm64-v8a/
          echo "✅ Package created successfully"
        else
          echo "❌ Binary not found"
          exit 1
        fi
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ollama-binary-${{ env.OLLAMA_VERSION }}
        path: output/
        retention-days: 30
        
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ollama-${{ env.OLLAMA_VERSION }}-android
        name: Ollama ${{ env.OLLAMA_VERSION }} Android ARM64 Binary
        body: |
          Pre-built Ollama binary for Android ARM64
          
          ## Usage
          Extract `arm64-v8a/ollama` to your Android project:
          ```
          android/app/src/main/assets/arm64-v8a/
          ```
          
          ## Build Info
          - Version: ${{ env.OLLAMA_VERSION }}
          - Target: arm64-v8a
          - Android API: 33
          - NDK: r26c
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
