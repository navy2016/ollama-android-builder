name: Stage 1 - Docker Build Ollama Android ARM64

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: Ollama version to build
        required: true
        default: v0.18.3

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Ollama
      uses: actions/checkout@v4
      with:
        repository: ollama/ollama
        ref: ${{ github.event.inputs.ollama_version }}
        path: ollama

    - name: Build using Docker
      run: |
        cat > Dockerfile << 'EOF'
        FROM golang:1.23-bookworm
        
        RUN apt-get update && apt-get install -y \
            cmake \
            ninja-build \
            clang \
            git \
            wget \
            unzip
        
        RUN wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip && \
            unzip -q android-ndk-r26c-linux.zip && \
            mv android-ndk-r26c /opt/ndk
        
        ENV ANDROID_NDK=/opt/ndk
        ENV TOOLCHAIN=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64
        ENV API=33
        ENV TARGET=aarch64-linux-android
        
        ENV AR=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        ENV CC=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang
        ENV CXX=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang++
        ENV LD=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/ld
        ENV RANLIB=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
        ENV STRIP=/opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
        
        WORKDIR /build
        
        COPY . .
        
        RUN mkdir -p build/android && cd build/android && \
            cmake ../../llama \
                -DCMAKE_TOOLCHAIN_FILE=/opt/ndk/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-33 \
                -DCMAKE_BUILD_TYPE=Release \
                -DLLAMA_NATIVE=OFF \
                -DLLAMA_ARM_NEON=ON \
                -DLLAMA_BUILD_EXAMPLES=OFF \
                -G Ninja && \
            ninja
        
        RUN CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
            CGO_CFLAGS="-fPIC -O3 -DANDROID -I/build/llama/include" \
            CGO_LDFLAGS="-L/build/build/android -pie -lllama" \
            go build -v -ldflags="-s -w" -o ollama-android-arm64 ./cmd/ollama
        
        RUN /opt/ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip ollama-android-arm64 && \
            mkdir -p /output/arm64-v8a && \
            cp ollama-android-arm64 /output/arm64-v8a/ollama && \
            echo "v0.18.3" > /output/arm64-v8a/version.txt && \
            chmod +x /output/arm64-v8a/ollama
        EOF
        
        docker build -t ollama-android-builder ./ollama
        
        docker create --name extract ollama-android-builder
        docker cp extract:/output ./output
        docker rm extract
        
        ls -la output/arm64-v8a/
        file output/arm64-v8a/ollama

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ollama-android-arm64
        path: output/
        retention-days: 30

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ollama-android-arm64-${{ github.event.inputs.ollama_version }}
        name: Ollama Android ARM64 ${{ github.event.inputs.ollama_version }}
        files: output/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
